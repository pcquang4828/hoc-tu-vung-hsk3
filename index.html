<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK3 Flash Card Ôn Tập Từ Vựng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-card { perspective: 1000px; }
        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%; height: 100%;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .flip-card-front {
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .flip-card-back {
            background-color: #ffffff;
            transform: rotateY(180deg);
            padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: center;
            overflow-y: auto;
        }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: bold; }
        .tab-inactive { border-bottom: 4px solid transparent; color: #6b7280; font-weight: normal; }
    </style>
</head>
<body class="bg-blue-50 min-h-screen font-sans text-gray-800 py-8">

    <div class="max-w-2xl mx-auto px-4">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-700 mb-2">Ôn Tập Từ Vựng</h1>
            <p id="status-text" class="text-gray-500">Đang tải dữ liệu từ Google Sheets...</p>
        </div>

        <div class="flex justify-center mb-6 border-b border-gray-300">
            <button id="btn-tab-1" onclick="switchTab(1)" class="px-6 py-2 tab-active transition">
                Bộ Từ Vựng HSK 3
            </button>
            <button id="btn-tab-2" onclick="switchTab(2)" class="px-6 py-2 tab-inactive hover:text-blue-500 transition">
                Bộ Từ Vựng SHZ
            </button>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <div class="text-sm text-gray-600 font-medium">
                Thẻ <span id="current-index" class="text-blue-600 font-bold text-lg">0</span> / <span id="total-cards">0</span>
            </div>
            <div class="flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full shadow-sm">
                <input type="checkbox" id="shuffleToggle" class="w-4 h-4 text-blue-600 rounded" onchange="toggleShuffle()">
                <label for="shuffleToggle" class="text-sm font-medium text-gray-700 cursor-pointer">Xáo trộn từ</label>
            </div>
        </div>

        <div class="relative w-full h-[28rem] cursor-pointer flip-card mb-8" id="flashcard">
            <div class="flip-card-inner">
                <div class="flip-card-front" onclick="flipCard()">
                    <h2 class="text-8xl font-bold text-gray-800 mb-6" id="fc-word">...</h2>
                    
                    <button onclick="speakWord(event)" class="bg-blue-100 hover:bg-blue-200 text-blue-600 p-4 rounded-full transition-colors shadow-sm mb-4">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                    </button>
                    <p class="text-gray-400 text-sm animate-pulse">Chạm vào nền trắng để lật thẻ</p>
                </div>

                <div class="flip-card-back" onclick="flipCard()">
                    <div class="text-center mb-6 pb-4" id="fc-back-top-section">
                        <p class="text-4xl font-bold text-blue-600 mb-2" id="fc-pinyin">Pinyin</p>
                        <p class="text-sm text-gray-500 font-medium bg-gray-100 inline-block px-2 py-1 rounded mb-3" id="fc-type">Loại từ</p>
                        <p class="text-3xl font-semibold text-gray-800" id="fc-meaning">Nghĩa tiếng Việt</p>
                    </div>
                    
                    <div class="bg-indigo-50 p-4 rounded-lg" id="fc-example-box">
                        <p class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2">Mẫu câu ví dụ</p>
                        <p class="text-xl font-medium text-gray-800 mb-1" id="fc-ex-cn">Mẫu câu tiếng Trung</p>
                        <p class="text-md text-gray-600 mb-2" id="fc-ex-pinyin">Phiên âm mẫu câu</p>
                        <p class="text-md text-indigo-700 font-medium" id="fc-ex-vn">Nghĩa của câu</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex space-x-4">
            <button onclick="prevCard()" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-4 px-4 rounded-xl shadow-sm transition">
                &larr; Lùi lại
            </button>
            <button onclick="nextCard()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-md transition">
                Tiếp theo &rarr;
            </button>
        </div>
    </div>

    <script>
        // === BẠN CHỈ CẦN THAY ĐỔI 2 ĐOẠN ID NÀY ===
        const SHEET_ID_1 = '1xxNXhJK-Hk9lh53TTMO-6LQuG3bL4Lr7rLbM3GXMozQ';
        const SHEET_ID_2 = '1_ez_0lFsXbdyT-qaU3YqPlfETmG9uXMcvUqGrf8D34o';
        // ==========================================

        const URL_1 = `https://docs.google.com/spreadsheets/d/${SHEET_ID_1}/export?format=csv`;
        const URL_2 = `https://docs.google.com/spreadsheets/d/${SHEET_ID_2}/export?format=csv&gid=192802101`;

        let dataTab1 = []; // Chứa dữ liệu HSK3 (có ví dụ)
        let dataTab2 = []; // Chứa dữ liệu Ngắn (chỉ có pinyin, nghĩa)
        
        let activeTab = 1; 
        let currentList = [];
        let currentIndex = 0;
        let isFlipped = false;

        // Tải dữ liệu từ cả 2 file cùng lúc
        async function fetchAllData() {
            try {
                const [res1, res2] = await Promise.all([fetch(URL_1), fetch(URL_2)]);
                const csv1 = await res1.text();
                const csv2 = await res2.text();
                
                parseData1(csv1);
                parseData2(csv2);
                
                document.getElementById('status-text').innerText = "Dữ liệu đã được đồng bộ tự động!";
                switchTab(1); // Mặc định mở Tab 1 đầu tiên
            } catch (error) {
                document.getElementById('status-text').innerHTML = "<span class='text-red-500'>Lỗi tải dữ liệu. Hãy kiểm tra lại ID của cả 2 Google Sheets!</span>";
            }
        }

        // Bóc tách dữ liệu File 1 (8 cột)
        function parseData1(text) {
            let data = csvToArray(text);
            dataTab1 = [];
            for (let j = 1; j < data.length; j++) {
                if (data[j].length >= 5 && data[j][1].trim() !== "") {
                    dataTab1.push({
                        word: data[j][1].trim(),
                        pinyin: data[j][2].trim(),
                        type: data[j][3].trim(),
                        meaning: data[j][4].trim(),
                        exCn: data[j][5] ? data[j][5].trim() : "",
                        exPinyin: data[j][6] ? data[j][6].trim() : "",
                        exVn: data[j][7] ? data[j][7].trim() : ""
                    });
                }
            }
        }

        // Bóc tách dữ liệu File 2 (4 cột)
        function parseData2(text) {
            let data = csvToArray(text);
            dataTab2 = [];
            for (let j = 1; j < data.length; j++) {
                if (data[j].length >= 4 && data[j][1].trim() !== "") {
                    dataTab2.push({
                        word: data[j][1].trim(),
                        pinyin: data[j][2].trim(),
                        type: "", // File 2 không có loại từ
                        meaning: data[j][3].trim()
                    });
                }
            }
        }

        // Hàm hỗ trợ tách CSV chuẩn xác
        function csvToArray(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l; s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.length > 1 || r[0] !== '');
        }

        // Chuyển đổi qua lại giữa 2 Tab
        function switchTab(tabNumber) {
            activeTab = tabNumber;
            const btn1 = document.getElementById('btn-tab-1');
            const btn2 = document.getElementById('btn-tab-2');
            
            if (tabNumber === 1) {
                btn1.className = "px-6 py-2 tab-active transition";
                btn2.className = "px-6 py-2 tab-inactive hover:text-blue-500 transition";
                currentList = [...dataTab1];
            } else {
                btn2.className = "px-6 py-2 tab-active transition";
                btn1.className = "px-6 py-2 tab-inactive hover:text-blue-500 transition";
                currentList = [...dataTab2];
            }
            
            // Xóa bỏ trạng thái xáo trộn mỗi khi đổi Tab
            document.getElementById('shuffleToggle').checked = false;
            
            // Đảm bảo thẻ đang úp khi đổi Tab
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            
            currentIndex = 0;
            document.getElementById('total-cards').innerText = currentList.length;
            updateUI();
        }

        function updateUI() {
            if (currentList.length === 0) return;
            
            const card = document.getElementById('flashcard');
            if (isFlipped) {
                card.classList.remove('flipped');
                isFlipped = false;
                setTimeout(populateData, 300); 
            } else {
                populateData();
            }
        }

        function populateData() {
            const item = currentList[currentIndex];
            document.getElementById('fc-word').innerText = item.word;
            document.getElementById('fc-pinyin').innerText = item.pinyin;
            document.getElementById('fc-meaning').innerText = item.meaning;
            
            // Ẩn/Hiện loại từ
            const typeEl = document.getElementById('fc-type');
            if (item.type) {
                typeEl.style.display = "inline-block";
                typeEl.innerText = item.type;
            } else {
                typeEl.style.display = "none";
            }
            
            // Ẩn/Hiện ô Ví dụ tùy theo Tab đang chọn
            const exBoxEl = document.getElementById('fc-example-box');
            if (activeTab === 1) {
                exBoxEl.style.display = "block";
                document.getElementById('fc-ex-cn').innerText = item.exCn || "Chưa có ví dụ";
                document.getElementById('fc-ex-pinyin').innerText = item.exPinyin || "";
                document.getElementById('fc-ex-vn').innerText = item.exVn || "";
            } else {
                exBoxEl.style.display = "none"; // Giấu ô ví dụ ở Tab 2
            }
            
            document.getElementById('current-index').innerText = currentIndex + 1;
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
        }

        function nextCard() {
            if(currentList.length > 0) {
                currentIndex = (currentIndex + 1) % currentList.length;
                updateUI();
            }
        }

        function prevCard() {
            if(currentList.length > 0) {
                currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
                updateUI();
            }
        }

        function toggleShuffle() {
            const isChecked = document.getElementById('shuffleToggle').checked;
            if (isChecked) {
                for (let i = currentList.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentList[i], currentList[j]] = [currentList[j], currentList[i]];
                }
            } else {
                currentList = activeTab === 1 ? [...dataTab1] : [...dataTab2];
            }
            currentIndex = 0;
            updateUI();
        }

        function speakWord(event) {
            event.stopPropagation(); 
            if (currentList.length === 0) return;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentList[currentIndex].word);
                utterance.lang = 'zh-CN'; 
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Trình duyệt của bạn không hỗ trợ tính năng phát âm!");
            }
        }

        // Khởi chạy
        fetchAllData();
    </script>
</body>
</html>
