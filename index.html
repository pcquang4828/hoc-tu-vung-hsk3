<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Học Tổng Hợp: Từ Vựng & Ngữ Pháp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-card { perspective: 1000px; }
        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative; width: 100%; height: 100%;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .flip-card-front {
            background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .flip-card-back {
            background-color: #ffffff; transform: rotateY(180deg); padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: center; overflow-y: auto;
        }
        
        .tab-btn { padding: 0.5rem 1rem; transition: all 0.3s; font-weight: 500; border-bottom: 4px solid transparent; }
        .tab-light-active { border-color: #2563eb; color: #2563eb; font-weight: bold; }
        .tab-light-inactive { color: #6b7280; }
        .tab-dark-active { border-color: #60a5fa; color: #60a5fa; font-weight: bold; }
        .tab-dark-inactive { color: #9ca3af; }
        
        /* BẢN VÁ LỖI HIỂN THỊ: Khôi phục cấu trúc văn bản Google Docs */
        .grammar-content {
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }
        /* Khôi phục bullet points và số thứ tự */
        .grammar-content ul {
            list-style-type: disc !important;
            padding-left: 2rem !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
            display: block !important;
        }
        .grammar-content ol {
            list-style-type: decimal !important;
            padding-left: 2rem !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
            display: block !important;
        }
        .grammar-content li {
            display: list-item !important;
            margin-bottom: 0.3rem !important;
            line-height: 1.6 !important;
        }
        /* Khôi phục khoảng cách đoạn văn và dòng trống */
        .grammar-content p {
            margin-bottom: 0.75rem !important;
            min-height: 1.25rem; /* Cứu các dòng trống bị ép phẳng */
            line-height: 1.6 !important;
        }
        /* Đồng bộ màu chữ ban đêm mà không làm hỏng cấu trúc HTML */
        .grammar-content * {
            color: #d1d5db !important; 
            background-color: transparent !important; 
            font-family: inherit !important;
        }
        .grammar-content strong, .grammar-content b {
            color: #ffffff !important;
        }
        /* Ép các thẻ span (dùng để thụt lề bằng phím Tab) hiển thị đúng */
        .grammar-content span {
            display: inline-block !important; 
        }
    </style>
</head>
<body id="body-app" class="bg-blue-50 min-h-screen font-sans text-gray-800 py-8 transition-colors duration-500">

    <div class="max-w-2xl mx-auto px-4">
        <div class="text-center mb-6">
            <h1 id="main-title" class="text-3xl font-bold text-blue-700 mb-2 transition-colors">Trạm Học Tổng Hợp</h1>
            <p id="status-text" class="text-gray-500 transition-colors">Đang kết nối kho dữ liệu trực tuyến...</p>
        </div>

        <div id="tab-bar" class="flex justify-between md:justify-center md:space-x-4 mb-6 border-b border-gray-300 overflow-x-auto pb-1">
            <button id="btn-tab-1" onclick="switchTab(1)" class="tab-btn tab-light-active whitespace-nowrap">Từ vựng đầy đủ</button>
            <button id="btn-tab-2" onclick="switchTab(2)" class="tab-btn tab-light-inactive whitespace-nowrap">Từ vựng ngắn</button>
            <button id="btn-tab-3" onclick="switchTab(3)" class="tab-btn tab-light-inactive whitespace-nowrap">📚 Ngữ pháp (Đêm)</button>
        </div>

        <div id="section-flashcard" class="block">
            <div class="flex justify-between items-center mb-4 px-2">
                <div id="card-counter" class="text-sm text-gray-600 font-medium">
                    Thẻ <span id="current-index" class="text-blue-600 font-bold text-lg">0</span> / <span id="total-cards">0</span>
                </div>
                <div id="shuffle-box" class="flex items-center space-x-2 bg-white px-3 py-1.5 rounded-full shadow-sm">
                    <input type="checkbox" id="shuffleToggle" class="w-4 h-4 text-blue-600 rounded" onchange="toggleShuffle()">
                    <label for="shuffleToggle" class="text-sm font-medium text-gray-700 cursor-pointer">Xáo trộn từ</label>
                </div>
            </div>

            <div class="relative w-full h-[28rem] cursor-pointer flip-card mb-8" id="flashcard">
                <div class="flip-card-inner">
                    <div class="flip-card-front" onclick="flipCard()">
                        <h2 class="text-8xl font-bold text-gray-800 mb-6" id="fc-word">...</h2>
                        <button onclick="speakWord(event)" class="bg-blue-100 hover:bg-blue-200 text-blue-600 p-4 rounded-full transition-colors shadow-sm mb-4">
                            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                        </button>
                        <p class="text-gray-400 text-sm animate-pulse">Chạm vào để lật thẻ xem nghĩa</p>
                    </div>
                    <div class="flip-card-back" onclick="flipCard()">
                        <div class="text-center mb-6 pb-4">
                            <p class="text-4xl font-bold text-blue-600 mb-2" id="fc-pinyin">Pinyin</p>
                            <p class="text-sm text-gray-500 font-medium bg-gray-100 inline-block px-2 py-1 rounded mb-3" id="fc-type">Loại từ</p>
                            <p class="text-3xl font-semibold text-gray-800" id="fc-meaning">Nghĩa tiếng Việt</p>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-lg" id="fc-example-box">
                            <p class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2">Mẫu câu ví dụ</p>
                            <p class="text-xl font-medium text-gray-800 mb-1" id="fc-ex-cn">Mẫu câu tiếng Trung</p>
                            <p class="text-md text-gray-600 mb-2" id="fc-ex-pinyin">Phiên âm mẫu câu</p>
                            <p class="text-md text-indigo-700 font-medium" id="fc-ex-vn">Nghĩa của câu</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex space-x-4">
                <button onclick="prevCard()" class="flex-1 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-4 px-4 rounded-xl shadow-sm transition">
                    &larr; Lùi lại
                </button>
                <button onclick="nextCard()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-md transition">
                    Tiếp theo &rarr;
                </button>
            </div>
        </div>

        <div id="section-grammar" class="hidden">
            <div class="flex justify-center space-x-2 mb-6">
                <button id="filter-all" onclick="filterGrammar('ALL')" class="px-3 py-1 text-xs rounded-full font-bold bg-blue-500 text-white shadow">Tất cả</button>
                <button id="filter-hsk1" onclick="filterGrammar('HSK 1')" class="px-3 py-1 text-xs rounded-full bg-gray-900 text-gray-400 border border-gray-800">HSK 1</button>
                <button id="filter-hsk2" onclick="filterGrammar('HSK 2')" class="px-3 py-1 text-xs rounded-full bg-gray-900 text-gray-400 border border-gray-800">HSK 2</button>
                <button id="filter-hsk3" onclick="filterGrammar('HSK 3')" class="px-3 py-1 text-xs rounded-full bg-gray-900 text-gray-400 border border-gray-800">HSK 3</button>
            </div>
            <div id="grammar-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // BẠN HÃY DÁN ĐÚNG 3 MÃ ID TÀI LIỆU CỦA BẠN VÀO ĐÂY NHÉ:
        const SHEET_ID_1 = '1xxNXhJK-Hk9lh53TTMO-6LQuG3bL4Lr7rLbM3GXMozQ';
        const SHEET_ID_2 = '1_ez_0lFsXbdyT-qaU3YqPlfETmG9uXMcvUqGrf8D34o';
        const DOC_ID_3 = '1jcOSwG94v1em8bLXrDuvSz3IotRYnwoj6z8k0-nGoFQ'; 
        // =======================================

        const URL_1 = `https://docs.google.com/spreadsheets/d/${SHEET_ID_1}/export?format=csv`;
        const URL_2 = `https://docs.google.com/spreadsheets/d/${SHEET_ID_2}/export?format=csv&gid=192802101`;
        const URL_3 = `https://docs.google.com/document/d/${DOC_ID_3}/export?format=html`;

        let dataTab1 = [], dataTab2 = [], dataGrammar = [];
        let activeTab = 1, currentList = [], currentIndex = 0, isFlipped = false;

        async function fetchAllData() {
            try {
                const [res1, res2, res3] = await Promise.all([fetch(URL_1), fetch(URL_2), fetch(URL_3)]);
                const csv1 = await res1.text(), csv2 = await res2.text(), htmlDocs = await res3.text();
                
                parseData1(csv1);
                parseData2(csv2);
                parseGrammarFromDocs(htmlDocs); 
                
                document.getElementById('status-text').innerText = "Đồng bộ toàn bộ kho dữ liệu thành công!";
                switchTab(1);
            } catch (error) {
                document.getElementById('status-text').innerHTML = "<span class='text-red-500 font-bold'>⚠️ Lỗi đồng bộ. Hãy kiểm tra ID file Docs!</span>";
            }
        }

        function parseData1(text) {
            let data = csvToArray(text); dataTab1 = [];
            for (let j = 1; j < data.length; j++) {
                if (data[j].length >= 5 && data[j][1].trim() !== "") {
                    dataTab1.push({
                        word: data[j][1].trim(), pinyin: data[j][2].trim(), type: data[j][3].trim(), meaning: data[j][4].trim(),
                        exCn: data[j][5] ? data[j][5].trim() : "", exPinyin: data[j][6] ? data[j][6].trim() : "", exVn: data[j][7] ? data[j][7].trim() : ""
                    });
                }
            }
        }

        function parseData2(text) {
            let data = csvToArray(text); dataTab2 = [];
            for (let j = 1; j < data.length; j++) {
                if (data[j].length >= 4 && data[j][1].trim() !== "") {
                    dataTab2.push({ word: data[j][1].trim(), pinyin: data[j][2].trim(), type: "", meaning: data[j][3].trim() });
                }
            }
        }

        function parseGrammarFromDocs(htmlText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            const styles = doc.querySelectorAll('style');
            let rawCss = '';
            styles.forEach(s => rawCss += s.textContent);
            
            let existingStyle = document.getElementById('gdocs-scoped-styles');
            if (existingStyle) existingStyle.remove();
            
            const styleElement = document.createElement('style');
            styleElement.id = 'gdocs-scoped-styles';
            styleElement.textContent = scopeCSS(rawCss, '.grammar-content');
            document.head.appendChild(styleElement);
            
            const children = Array.from(doc.body.children);
            dataGrammar = [];
            
            let currentLevel = "CHƯA PHÂN LOẠI";
            let currentTitle = "";
            let currentContentHtml = [];
            
            children.forEach(child => {
                const tag = child.tagName.toLowerCase();
                
                if (tag === 'h1') {
                    if (currentTitle) {
                        dataGrammar.push({ level: currentLevel, title: currentTitle, content: currentContentHtml.join('') });
                    }
                    currentLevel = child.textContent.trim().toUpperCase();
                    currentTitle = "";
                    currentContentHtml = [];
                } else if (tag === 'h2') {
                    if (currentTitle) {
                        dataGrammar.push({ level: currentLevel, title: currentTitle, content: currentContentHtml.join('') });
                    }
                    currentTitle = child.textContent.trim();
                    currentContentHtml = [];
                } else {
                    if (currentTitle) {
                        currentContentHtml.push(child.outerHTML);
                    }
                }
            });
            
            if (currentTitle) {
                dataGrammar.push({ level: currentLevel, title: currentTitle, content: currentContentHtml.join('') });
            }
        }

        function scopeCSS(cssText, prefix) {
            return cssText.replace(/([^\s{][^{]*)\{/g, function(match, selector) {
                const prefixedSelectors = selector.split(',').map(sel => {
                    sel = sel.trim();
                    if (!sel) return '';
                    if (sel === 'body') return prefix;
                    return prefix + ' ' + sel;
                }).filter(Boolean).join(', ');
                return prefixedSelectors + ' {';
            });
        }

        function csvToArray(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) { if (s && l === p) row[i] += l; s = !s; } 
                else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.length > 1 || r[0] !== '');
        }

        function switchTab(tabNumber) {
            activeTab = tabNumber;
            const body = document.getElementById('body-app');
            const mainTitle = document.getElementById('main-title');
            const statusText = document.getElementById('status-text');
            const tabBar = document.getElementById('tab-bar');
            const secFlashcard = document.getElementById('section-flashcard');
            const secGrammar = document.getElementById('section-grammar');
            
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            document.getElementById('shuffleToggle').checked = false;

            if (tabNumber === 3) {
                body.className = "bg-gray-950 min-h-screen font-sans text-gray-100 py-8 transition-colors duration-500";
                mainTitle.className = "text-3xl font-bold text-blue-400 mb-2 transition-colors";
                statusText.className = "text-gray-400 text-sm transition-colors";
                tabBar.className = "flex justify-between md:justify-center md:space-x-4 mb-6 border-b border-gray-700 overflow-x-auto pb-1";
                secFlashcard.classList.add('hidden');
                secGrammar.classList.remove('hidden');
                updateTabButtonsStyle(true);
                renderGrammarList(dataGrammar);
            } else {
                body.className = "bg-blue-50 min-h-screen font-sans text-gray-800 py-8 transition-colors duration-500";
                mainTitle.className = "text-3xl font-bold text-blue-700 mb-2 transition-colors";
                statusText.className = "text-gray-500 text-sm transition-colors";
                tabBar.className = "flex justify-between md:justify-center md:space-x-4 mb-6 border-b border-gray-300 overflow-x-auto pb-1";
                secGrammar.classList.add('hidden');
                secFlashcard.classList.remove('hidden');
                currentList = (tabNumber === 1) ? [...dataTab1] : [...dataTab2];
                document.getElementById('total-cards').innerText = currentList.length;
                updateTabButtonsStyle(false);
                currentIndex = 0;
                updateUI();
            }
        }

        function updateTabButtonsStyle(isDarkMode) {
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-tab-${i}`);
                if (isDarkMode) {
                    btn.className = (i === activeTab) ? "tab-btn tab-dark-active" : "tab-btn tab-dark-inactive hover:text-blue-400";
                } else {
                    btn.className = (i === activeTab) ? "tab-btn tab-light-active" : "tab-btn tab-light-inactive hover:text-blue-500";
                }
            }
        }

        function renderGrammarList(list) {
            const container = document.getElementById('grammar-list');
            container.innerHTML = '';
            
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-500">Đang đồng bộ hoặc tài liệu trống. Hãy kiểm tra lại định dạng Heading trên Google Docs!</div>`;
                return;
            }
            
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg hover:border-gray-700 transition duration-300 text-left";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3 border-b border-gray-800 pb-2">
                        <h3 class="text-xl font-bold text-blue-400 tracking-wide">${item.title}</h3>
                        <span class="text-[10px] font-extrabold px-2 py-0.5 rounded bg-blue-950 text-blue-400 uppercase tracking-widest border border-blue-900">${item.level}</span>
                    </div>
                    <div class="grammar-content">${item.content}</div>
                `;
                container.appendChild(div);
            });
        }

        function filterGrammar(level) {
            const filters = ['all', 'hsk1', 'hsk2', 'hsk3'];
            filters.forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if (`filter-${level.toLowerCase().replace(' ', '')}` === `filter-${f}`) {
                    btn.className = "px-3 py-1 text-xs rounded-full font-bold bg-blue-500 text-white shadow";
                } else {
                    btn.className = "px-3 py-1 text-xs rounded-full bg-gray-900 text-gray-400 border border-gray-800";
                }
            });

            if (level === 'ALL') {
                renderGrammarList(dataGrammar);
            } else {
                const filtered = dataGrammar.filter(item => item.level.includes(level));
                renderGrammarList(filtered);
            }
        }

        function updateUI() {
            if (currentList.length === 0) return;
            const card = document.getElementById('flashcard');
            if (isFlipped) {
                card.classList.remove('flipped'); isFlipped = false;
                setTimeout(populateData, 300); 
            } else { populateData(); }
        }

        function populateData() {
            const item = currentList[currentIndex];
            document.getElementById('fc-word').innerText = item.word;
            document.getElementById('fc-pinyin').innerText = item.pinyin;
            document.getElementById('fc-meaning').innerText = item.meaning;
            
            const typeEl = document.getElementById('fc-type');
            if (item.type) { typeEl.style.display = "inline-block"; typeEl.innerText = item.type; } 
            else { typeEl.style.display = "none"; }
            
            const exBoxEl = document.getElementById('fc-example-box');
            if (activeTab === 1) {
                exBoxEl.style.display = "block";
                document.getElementById('fc-ex-cn').innerText = item.exCn || "Chưa có ví dụ";
                document.getElementById('fc-ex-pinyin').innerText = item.exPinyin || "";
                document.getElementById('fc-ex-vn').innerText = item.exVn || "";
            } else { exBoxEl.style.display = "none"; }
            
            document.getElementById('current-index').innerText = currentIndex + 1;
        }

        function flipCard() { isFlipped = !isFlipped; document.getElementById('flashcard').classList.toggle('flipped', isFlipped); }
        function nextCard() { if(currentList.length > 0) { currentIndex = (currentIndex + 1) % currentList.length; updateUI(); } }
        function prevCard() { if(currentList.length > 0) { currentIndex = (currentIndex - 1 + currentList.length) % currentList.length; updateUI(); } }

        document.addEventListener('keydown', function(e) {
            if (activeTab !== 3) {
                if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); flipCard(); }
                else if (e.key === 'ArrowRight') { nextCard(); }
                else if (e.key === 'ArrowLeft') { prevCard(); }
                else if (e.key === 'v' || e.key === 'V') { speakWord({stopPropagation: function(){}}); }
            }
        });

        function toggleShuffle() {
            const isChecked = document.getElementById('shuffleToggle').checked;
            if (isChecked) {
                for (let i = currentList.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentList[i], currentList[j]] = [currentList[j], currentList[i]];
                }
            } else { currentList = activeTab === 1 ? [...dataTab1] : [...dataTab2]; }
            currentIndex = 0; updateUI();
        }

        function speakWord(event) {
            if(event && event.stopPropagation) event.stopPropagation(); 
            if (currentList.length === 0) return;
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentList[currentIndex].word);
                utterance.lang = 'zh-CN'; utterance.rate = 0.9; window.speechSynthesis.speak(utterance);
            } else { alert("Trình duyệt không hỗ trợ phát âm!"); }
        }

        fetchAllData();
    </script>
</body>
</html>
